name: PSX Engine Loop

# Times are UTC. PSX runs on Asia/Karachi (UTC+5, no DST).
#   04:45 UTC        = 09:45 PKT             (your requested 09:45 start)
#   05:00-10:45 UTC  = 10:00-15:45 PKT       (every 15 min through the session)
# NOTE: GitHub Actions cron is best-effort and may be delayed 5-15 min.
on:
  schedule:
    - cron: '45 4 * * 1-5'
    - cron: '*/15 5-10 * * 1-5'
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

permissions:
  contents: write          # needed to commit the updated database

concurrency:
  group: psx-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_MODE: actionable      # email only when a Buy/Strong Buy/Exit appears
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis (+ email if actionable)
        run: python main.py run

      - name: Commit updated database
        run: |
          git config user.name "psx-bot"
          git config user.email "actions@users.noreply.github.com"
          git add psx_engine.db
          git commit -m "Automated run $(date -u +'%Y-%m-%dT%H:%MZ')" \
            || { echo "No data changes to commit."; exit 0; }
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git push
