name: PSX Engine Loop

# Scheduling: GitHub's own cron proved unreliable here (zero scheduled runs
# fired) — the 15-min cadence is driven by an EXTERNAL pinger (cron-job.org)
# calling workflow_dispatch. See DEPLOY.md "Reliable scheduling".
# The single cron below (09:45 PKT kickoff) is kept as a dormant backup only.
on:
  schedule:
    - cron: '45 4 * * 1-5'          # 09:45 PKT — backup morning kickoff
  workflow_dispatch: {}   # primary trigger: cron-job.org pinger + manual runs

permissions:
  contents: write          # needed to commit the updated database

concurrency:
  group: psx-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_MODE: always          # email after every run (dashboard-update alert)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run analysis (+ email if actionable)
        run: python main.py run

      - name: Commit updated database
        # psx_engine.db is a binary SQLite file; a plain `git pull --rebase`
        # cannot 3-way-merge it, so overlapping runs used to hard-fail with a
        # binary CONFLICT and stall the cadence. Instead: keep THIS run's fresh
        # DB on conflict (-X theirs = the commit being replayed) and retry the
        # push if remote advances mid-flight. Tradeoff: an overlapping loser's
        # appended rows are dropped — acceptable for a 15-min self-healing loop.
        run: |
          git config user.name "psx-bot"
          git config user.email "actions@users.noreply.github.com"
          git add psx_engine.db
          git commit -m "Automated run $(date -u +'%Y-%m-%dT%H:%MZ')" \
            || { echo "No data changes to commit."; exit 0; }
          for attempt in 1 2 3 4 5; do
            git pull --rebase -X theirs --autostash origin "${{ github.ref_name }}" \
              || git rebase --abort
            if git push; then echo "pushed on attempt $attempt"; exit 0; fi
            echo "push raced, retrying ($attempt)..."; sleep 5
          done
          echo "could not push after retries"; exit 1
