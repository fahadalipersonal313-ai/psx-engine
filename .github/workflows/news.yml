name: news-routine

# Fetches raw last-24h headlines for every symbol + macro feeds and commits
# news_raw_24h.json. Runs AUTOMATICALLY every weekday morning (cron below) so no
# manual "Run the repo news" prompt is needed — the dashboard reads the raw file
# and shows the headlines per symbol UNSCORED, for manual cross-verification.
# (News carries ZERO score weight as of 2026-07-15; the old LLM-judged
# news_signals.json step is optional and only matters if weights are restored.)
on:
  schedule:
    # Staggered weekday-morning fetches (UTC). GitHub cron is unreliable/late, so
    # a few attempts ensure the raw file refreshes each trading morning.
    - cron: '5 4 * * 1-5'           # 09:05 PKT
    - cron: '35 4 * * 1-5'          # 09:35 PKT
    - cron: '5 6 * * 1-5'           # 11:05 PKT — self-heal if the earlier ones skipped
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Lookback window in hours (default 24; use 96 for a 4-day backfill)"
        required: false
        default: "24"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Fetch news
        env:
          # Empty on scheduled (cron) runs — fall back to 24 so int() never sees "".
          NEWS_WINDOW_HOURS: ${{ inputs.window_hours || '24' }}
        run: python news_fetcher.py
      - name: Commit raw news
        run: |
          git config user.name  "psx-news-bot"
          git config user.email "psx-news-bot@users.noreply.github.com"
          git add news_raw_24h.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "news raw fetch $(date -u +'%Y-%m-%dT%H:%MZ')"
          git pull --rebase -X theirs --autostash origin main || git rebase --abort
          for i in 1 2 3 4; do
            git push origin main && break
            sleep $((2 ** i))
          done
