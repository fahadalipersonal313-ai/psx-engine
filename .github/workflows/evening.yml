name: PSX Evening Summary

# 16:00 UTC = 21:00 PKT — post-market: grade past signals (1/3/7-day outcomes)
# and email the evening summary. Runs Mon-Fri.
on:
  schedule:
    - cron: '0 16 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: psx-engine
  cancel-in-progress: false

jobs:
  evening:
    runs-on: ubuntu-latest
    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_MODE: always          # always send the daily evening summary
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Evening report + outcome grading
        run: python main.py evening

      - name: Commit updated database
        # See engine.yml: binary SQLite DB can't be 3-way-merged, so keep this
        # run's fresh DB on conflict (-X theirs) and retry the push if remote
        # moves mid-flight, rather than hard-failing on a binary CONFLICT.
        run: |
          git config user.name "psx-bot"
          git config user.email "actions@users.noreply.github.com"
          git add psx_engine.db
          git commit -m "Evening grading $(date -u +'%Y-%m-%dT%H:%MZ')" \
            || { echo "No data changes to commit."; exit 0; }
          for attempt in 1 2 3 4 5; do
            git pull --rebase -X theirs --autostash origin "${{ github.ref_name }}" \
              || git rebase --abort
            if git push; then echo "pushed on attempt $attempt"; exit 0; fi
            echo "push raced, retrying ($attempt)..."; sleep 5
          done
          echo "could not push after retries"; exit 1
